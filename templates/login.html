<!DOCTYPE html>
<html>

<head>

    <title>Login - CyberGuardian</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        .strength-box {
            margin-top: 8px;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: bold;
            color: white;
            display: inline-block;
            min-width: 120px;
            text-align: center;
        }

        .weak {
            background-color: #e74c3c;
        }

        .medium {
            background-color: #f39c12;
        }

        .strong {
            background-color: #27ae60;
        }

        .strength-bar {
            height: 8px;
            width: 250px;
            background-color: #ddd;
            border-radius: 4px;
            margin: 8px auto 0;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s, background-color 0.3s;
        }

        .password-wrapper {
            position: relative;
            display: inline-block;
            width: auto;
        }

        .password-wrapper input {
            padding-right: 35px;
            box-sizing: border-box;
        }

        .eye-button {
            position: absolute !important;
            right: 6px !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            background: transparent !important;
            border: none !important;
            cursor: pointer !important;
            font-size: 16px !important;
            padding: 0 !important;
            margin: 0 !important;
            color: #555 !important;
            width: 28px !important;
            height: 24px !important;
            line-height: 1 !important;
            border-radius: 0 !important;
        }

        .eye-button:hover {
            background: transparent !important;
            color: #00d4ff !important;
        }

        .message-box {
            width: 80%;
            max-width: 400px;
            margin: 15px auto;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
        }

        .success-msg {
            background-color: #27ae60;
            color: white;
        }

        .error-msg {
            background-color: #e74c3c;
            color: white;
        }
    </style>

</head>

<body>

    <h1>CyberGuardian Login</h1>

    {% if success %}
        <div class="message-box success-msg">{{ success }}</div>
    {% endif %}

    {% if error %}
        <div class="message-box error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">

        <label>Email:</label><br>
        <input type="email" name="email" required><br><br>

        <label>Password:</label><br>
        <div class="password-wrapper">
            <input type="password" name="password" id="password" oninput="checkStrength()" required>
            <button type="button" class="eye-button" id="eyeButton" onclick="togglePassword()">👁</button>
        </div>
        <br>

        <div class="strength-bar">
            <div class="strength-fill" id="strengthFill"></div>
        </div>

        <div id="strengthBox" class="strength-box" style="display:none;"></div>
        <br><br>

        <button type="submit">Login</button>

    </form>

    <script>
        function togglePassword() {
            var pwd = document.getElementById("password");
            var btn = document.getElementById("eyeButton");
            if (pwd.type === "password") {
                pwd.type = "text";
                btn.innerText = "🙈";
            } else {
                pwd.type = "password";
                btn.innerText = "👁";
            }
        }

        function checkStrength() {
            var password = document.getElementById("password").value;
            var box = document.getElementById("strengthBox");
            var fill = document.getElementById("strengthFill");

            var score = 0;

            if (password.length >= 8) score++;
            if (/[A-Z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[@#$%^&*!]/.test(password)) score++;

            if (password.length === 0) {
                box.style.display = "none";
                fill.style.width = "0%";
                return;
            }

            box.style.display = "inline-block";

            if (score <= 1) {
                box.className = "strength-box weak";
                box.innerText = "Weak";
                fill.style.width = "33%";
                fill.style.backgroundColor = "#e74c3c";
            } else if (score <= 3) {
                box.className = "strength-box medium";
                box.innerText = "Medium";
                fill.style.width = "66%";
                fill.style.backgroundColor = "#f39c12";
            } else {
                box.className = "strength-box strong";
                box.innerText = "Strong";
                fill.style.width = "100%";
                fill.style.backgroundColor = "#27ae60";
            }
        }
    </script>

</body>

</html>
