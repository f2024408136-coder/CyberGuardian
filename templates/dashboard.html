<!DOCTYPE html>
<html>

<head>

    <title>Dashboard - CyberGuardian</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="navbar">

        <a href="/login">Login</a>

        <a href="/scanner">Scanner</a>

        <a href="/signup">Signup</a>

    </div>

    <h1>CyberGuardian Dashboard</h1>

    <h3>Security Status</h3>

    <div class="alert-box warning">
        2 Weak Passwords Detected
    </div>

    <div class="alert-box danger">
        {{ suspicious_count }} Suspicious Files Found
    </div>

    <div class="alert-box moderate">
        Security Score: {{ security_score }}%
    </div>

    <br><br>

    <h2>Latest Security Alerts</h2>

    <div class="alert-box warning">
        {{ threat1 }}
    </div>

    <div class="alert-box danger">
        {{ threat2 }}
    </div>

    <div class="alert-box moderate">
        {{ threat3 }}
    </div>

    <a href="/scanner">
        <button>Open File Scanner</button>
    </a>

</body>

</html>
